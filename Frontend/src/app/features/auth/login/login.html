<div class="center-wrapper">
  <mat-card class="auth-card">
    <mat-card-title>Welcome Back</mat-card-title>
    <p class="subtitle">Please enter your details to sign in</p>
    
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" placeholder="name@company.com" />
          <mat-icon matPrefix>mail</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="••••••••" />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        @if (error) {
          <div class="error-text">{{ error }}</div>
        }

        <button mat-flat-button class="submit-btn" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <p class="link-text">
        Don't have an account? <a routerLink="/register">Create an account</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
