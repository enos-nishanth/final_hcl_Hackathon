<h2 mat-dialog-title>{{ data ? 'Edit' : 'Add' }} Product</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="product-form">
    <mat-form-field><mat-label>Name</mat-label><input matInput formControlName="name" /></mat-form-field>
    <mat-form-field><mat-label>Description</mat-label><input matInput formControlName="description" /></mat-form-field>
    <mat-form-field><mat-label>Price</mat-label><input matInput type="number" formControlName="price" /></mat-form-field>
    <mat-form-field><mat-label>Stock Quantity</mat-label><input matInput type="number" formControlName="stockQuantity" /></mat-form-field>
    <mat-form-field><mat-label>Image URL</mat-label><input matInput formControlName="imageUrl" /></mat-form-field>
    <mat-form-field>
      <mat-label>Brand</mat-label>
      <mat-select formControlName="brandId">
        @for (b of brands(); track b.id) { <mat-option [value]="b.id">{{ b.name }}</mat-option> }
      </mat-select>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Category</mat-label>
      <mat-select formControlName="categoryId">
        @for (c of categories(); track c.id) { <mat-option [value]="c.id">{{ c.name }}</mat-option> }
      </mat-select>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Packaging Type</mat-label>
      <mat-select formControlName="packagingTypeId">
        @for (p of packagingTypes(); track p.id) { <mat-option [value]="p.id">{{ p.name }}</mat-option> }
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid || loading">
    {{ loading ? 'Saving...' : 'Save' }}
  </button>
</mat-dialog-actions>
