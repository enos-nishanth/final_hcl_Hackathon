<h2>Manage {{ title() }}</h2>

<mat-card class="form-card">
  <form [formGroup]="form" (ngSubmit)="submit()" class="inline-form">
    <mat-form-field><mat-label>Name</mat-label><input matInput formControlName="name" /></mat-form-field>
    <mat-form-field><mat-label>Description</mat-label><input matInput formControlName="description" /></mat-form-field>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      {{ editingId() ? 'Update' : 'Add' }}
    </button>
    @if (editingId()) {
      <button mat-button type="button" (click)="cancelEdit()">Cancel</button>
    }
  </form>
</mat-card>

<table mat-table [dataSource]="items()" class="full-width">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let item">{{ item.name }}</td>
  </ng-container>
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Description</th>
    <td mat-cell *matCellDef="let item">{{ item.description }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let item">
      <button mat-icon-button color="primary" (click)="edit(item)"><mat-icon>edit</mat-icon></button>
      <button mat-icon-button color="warn" (click)="delete(item.id)"><mat-icon>delete</mat-icon></button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols;"></tr>
</table>
