<h2>Admin Dashboard</h2>

<div class="stats-grid">
  <mat-card class="stat-card">
    <h1>{{ totalProducts() }}</h1>
    <p>Total Products</p>
  </mat-card>
  <mat-card class="stat-card">
    <h1>{{ totalOrders() }}</h1>
    <p>Total Orders</p>
  </mat-card>
  <mat-card class="stat-card warning-card">
    <h1 class="warning-text">{{ lowStock() }}</h1>
    <p>Low Stock Items</p>
  </mat-card>
</div>

<h3>Recent Orders</h3>
<table mat-table [dataSource]="recentOrders()" class="full-width">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let o">{{ o.id }}</td>
  </ng-container>
  <ng-container matColumnDef="customer">
    <th mat-header-cell *matHeaderCellDef>Customer</th>
    <td mat-cell *matCellDef="let o">{{ o.customerName }}</td>
  </ng-container>
  <ng-container matColumnDef="total">
    <th mat-header-cell *matHeaderCellDef>Total</th>
    <td mat-cell *matCellDef="let o">₹{{ o.totalAmount }}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let o">{{ o.status }}</td>
  </ng-container>
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let o">{{ o.orderDate | date:'short' }}</td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols;"></tr>
</table>
