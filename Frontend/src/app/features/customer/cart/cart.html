<h2>Your Cart</h2>

@if (cart.items().length === 0) {
  <mat-card class="empty-cart">
    <p>Your cart is empty.</p>
    <button mat-raised-button color="primary" (click)="router.navigate(['/menu'])">Browse Menu</button>
  </mat-card>
} @else {
  <table mat-table [dataSource]="cart.items()" class="full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Product</th>
      <td mat-cell *matCellDef="let item">{{ item.name }}</td>
    </ng-container>
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let item">₹{{ item.price }}</td>
    </ng-container>
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Qty</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button (click)="cart.updateQuantity(item.productId, item.quantity - 1)">
          <mat-icon>remove</mat-icon>
        </button>
        {{ item.quantity }}
        <button mat-icon-button (click)="cart.updateQuantity(item.productId, item.quantity + 1)">
          <mat-icon>add</mat-icon>
        </button>
      </td>
    </ng-container>
    <ng-container matColumnDef="subtotal">
      <th mat-header-cell *matHeaderCellDef>Subtotal</th>
      <td mat-cell *matCellDef="let item">₹{{ item.price * item.quantity }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="warn" (click)="cart.removeItem(item.productId)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols;"></tr>
  </table>

  <mat-card class="cart-footer">
    <h3>Total: ₹{{ cart.total() }}</h3>
    <div>
      <button mat-button color="warn" (click)="cart.clearCart()">Clear Cart</button>
      <button mat-raised-button color="primary" [disabled]="loading" (click)="placeOrder()">
        {{ loading ? 'Placing Order...' : 'Place Order' }}
      </button>
    </div>
  </mat-card>
}
